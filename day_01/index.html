<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="main">
        <form>
            <input type="text" placeholder="Enter your Name"><br>
            <input type="email" placeholder="Enter your Email"><br>
            <input type="password" placeholder="Enter your Password"><br>
            <input type="datetime-local"><br>
            <input name="Gender" id="male" type="radio">
            <label for="male">Male</label>
            <input name="Gender" id="female" type="radio">
            <label for="female">Female</label>
            <input name="Gender" id="other" type="radio">
            <label for="other">Other</label> <br>
            <input type="checkbox" name="" id="terms">
            <label for="terms">I agree the terms and conditions</label><br>
            <a href="#">Read Terms & Conditions</a><br>
            <div class="container">
                <button class="btn">Submit</button>
                <button class="btn">Cancel</button>
            </div>


        </form>
    </div>
</body>

</html>
